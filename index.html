<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Do You Love Me? 💖</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Arial", sans-serif;
        background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 20px;
      }

      .container {
        background-color: rgba(255, 255, 255, 0.95);
        border-radius: 20px;
        padding: 40px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        text-align: center;
        max-width: 600px;
        width: 100%;
      }

      h1 {
        color: #ff4d6d;
        margin-bottom: 20px;
        font-size: 2rem;
        text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.5);
      }

      .image-container {
        margin: 20px 0;
        min-height: 200px;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .image-container img {
        max-width: 100%;
        max-height: 250px;
        border-radius: 15px;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
      }

      .message {
        font-size: 1.5rem;
        margin: 20px 0;
        color: #333;
        font-weight: bold;
        min-height: 80px;
        padding: 15px;
        background: rgba(255, 255, 255, 0.7);
        border-radius: 10px;
        border: 2px dashed #ff4d6d;
      }

      .button-container {
        position: relative;
        height: 200px;
        margin: 30px 0 20px;
        border: 2px dotted rgba(255, 77, 109, 0.3);
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.3);
      }

      .btn {
        padding: 15px 40px;
        font-size: 1.5rem;
        font-weight: bold;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.3s ease;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }

      .btn-yes {
        background-color: #4caf50;
        color: white;
        position: absolute;
        left: 50px;
        top: 50%;
        transform: translateY(-50%);
        z-index: 10;
      }

      .btn-yes:hover {
        background-color: #45a049;
        transform: translateY(-50%) scale(1.1);
      }

      .btn-no {
        background-color: #f44336;
        color: white;
        position: absolute;
        right: 50px;
        top: 50%;
        transform: translateY(-50%);
        transition: all 0.2s ease;
        z-index: 5;
      }

      .btn-no:hover {
        background-color: #d32f2f;
      }

      .reset-btn {
        background-color: #ff4d6d;
        color: white;
        padding: 10px 30px;
        font-size: 1.2rem;
        margin-top: 20px;
        border: none;
        border-radius: 50px;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .reset-btn:hover {
        background-color: #ff3355;
        transform: scale(1.05);
      }

      .counter {
        font-size: 1.2rem;
        color: #666;
        margin: 10px 0;
        font-weight: bold;
        opacity: 0;
      }

      .hidden {
        display: none !important;
      }

      @media (max-width: 500px) {
        .btn {
          padding: 12px 25px;
          font-size: 1.2rem;
        }

        h1 {
          font-size: 2rem;
        }

        .btn-yes {
          left: 20px;
        }

        .btn-no {
          right: 20px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>I have a question for you... 💕</h1>

      <!-- Image container for memes and cute images -->
      <div class="image-container">
        <img
          id="displayImage"
          src="https://imgs.search.brave.com/amNB0De8nJuE-Q2Ye058Vql69gvowt1fYRR5XE1v_Kw/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9pLnBp/bmltZy5jb20vdmlk/ZW9zL3RodW1ibmFp/bHMvb3JpZ2luYWxz/LzIxLzZjL2U3LzIx/NmNlNzI3NzQzMmFk/YjA2ZjYxZDg3MDUw/NzY4MWU3LjAwMDAw/MDAuanBn"
          alt="Love Image"
        />
      </div>

      <!-- Message display area -->
      <div class="message" id="messageBox">🌸 Do You Love Me? 🌸</div>

      <!-- Counter for No button attempts -->
      <div class="counter" id="counter">
        Attempts to say no: <span id="noCount">0</span>/4
      </div>

      <!-- Button container with the Yes and No buttons -->
      <div class="button-container" id="buttonContainer">
        <button class="btn btn-yes" id="yesBtn" onclick="sayYes()">
          YES 💖
        </button>
        <button class="btn btn-no" id="noBtn" onmouseover="moveNoButton()">
          NO 😢
        </button>
      </div>

      <!-- Reset button (hidden until game ends) -->
      <button class="reset-btn hidden" id="resetBtn" onclick="resetGame()">
        Play Again 🔄
      </button>
    </div>

    <script>
      // Game variables
      let noClickCount = 0;
      const maxNoClicks = 4;
      let gameActive = true;
      let noButton = document.getElementById("noBtn");
      let yesButton = document.getElementById("yesBtn");
      let messageBox = document.getElementById("messageBox");
      let displayImage = document.getElementById("displayImage");
      let counterSpan = document.getElementById("noCount");
      let resetBtn = document.getElementById("resetBtn");
      let buttonContainer = document.getElementById("buttonContainer");

      // Arrays of messages and images
      const noMessages = [
        "🤔 Raki Sur ?!",
        "😒 A hechmi diri YES!",
        "😑 Aywaa Darweeeeek ...",
        "🧐 Sema Haka ",
        "🚫 Final warning! Say YES or else! 😠",
      ];

      const noImages = [
        "https://imgs.search.brave.com/UxeHT-GQ4VvrsjW1ix5qqRxF4UPbfBkcMdjR7ZfSuOw/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9wcmV2/aWV3LnJlZGQuaXQv/c2hvdy1tZS15b3Vy/LWZhdi1jYXQtbWVt/ZS12MC05Mm5wbzJv/aDU1eGQxLmpwZWc_/d2lkdGg9MTA4MCZm/b3JtYXQ9cGpwZyZh/dXRvPXdlYnAmcz1k/OTYzYjJmYjhiMTFk/OTY0ZTdiZTQ2MTk4/OTdjNzBhOWFmMzBi/YWFk", // Sad cat
        "https://imgs.search.brave.com/KfIDW30dNEW68JXTci6AwV3qjXs9c1cfXPBx4kGof6k/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9pLmlt/Z2ZsaXAuY29tLzIv/OHdmc2IuanBn", // Pouting
        "https://imgs.search.brave.com/_1_JqXNIImXQRP-uIwv7yYW-ex5kPFKbZa4bmmqJi7M/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9hLnRo/dW1icy5yZWRkaXRt/ZWRpYS5jb20vdF9T/a1F0bTdXdDZFNXhl/WGtqOFFvVFI3Tk12/Rjd4ZUlnWVM3RGZT/T0hEOC5qcGc", // Crying
        "https://imgs.search.brave.com/f01jYiK96R3UnczwzvcUXl1nQmVj9-UcVkBnzyiNsFg/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9tZWRp/YS50ZW5vci5jb20v/bm50bGpkN0FiUkVB/QUFBTS9jYW50LXNs/ZWVwLWF3YWtlLmdp/Zg.gif", // Angry
      ];

      const yesMessages = [
        "YAY! I knew it! I love you! 💕",
        "You just made my whole day! 🌟",
        "Best decision ever! I love you too! ❤️",
        "Let's be happy together forever! 💑",
        "My heart is dancing! Thank you! 💖",
      ];

      const yesImages = [
        "https://imgs.search.brave.com/amNB0De8nJuE-Q2Ye058Vql69gvowt1fYRR5XE1v_Kw/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9pLnBp/bmltZy5jb20vdmlk/ZW9zL3RodW1ibmFp/bHMvb3JpZ2luYWxz/LzIxLzZjL2U3LzIx/NmNlNzI3NzQzMmFk/YjA2ZjYxZDg3MDUw/NzY4MWU3LjAwMDAw/MDAuanBn", // Happy dance
        "https://imgs.search.brave.com/amNB0De8nJuE-Q2Ye058Vql69gvowt1fYRR5XE1v_Kw/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9pLnBp/bmltZy5jb20vdmlk/ZW9zL3RodW1ibmFp/bHMvb3JpZ2luYWxz/LzIxLzZjL2U3LzIx/NmNlNzI3NzQzMmFk/YjA2ZjYxZDg3MDUw/NzY4MWU3LjAwMDAw/MDAuanBn", // Heart eyes
        "https://imgs.search.brave.com/amNB0De8nJuE-Q2Ye058Vql69gvowt1fYRR5XE1v_Kw/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9pLnBp/bmltZy5jb20vdmlk/ZW9zL3RodW1ibmFp/bHMvb3JpZ2luYWxz/LzIxLzZjL2U3LzIx/NmNlNzI3NzQzMmFk/YjA2ZjYxZDg3MDUw/NzY4MWU3LjAwMDAw/MDAuanBn", // Cute hug
        "https://imgs.search.brave.com/amNB0De8nJuE-Q2Ye058Vql69gvowt1fYRR5XE1v_Kw/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9pLnBp/bmltZy5jb20vdmlk/ZW9zL3RodW1ibmFp/bHMvb3JpZ2luYWxz/LzIxLzZjL2U3LzIx/NmNlNzI3NzQzMmFk/YjA2ZjYxZDg3MDUw/NzY4MWU3LjAwMDAw/MDAuanBn", // Sparkles
        "https://imgs.search.brave.com/amNB0De8nJuE-Q2Ye058Vql69gvowt1fYRR5XE1v_Kw/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9pLnBp/bmltZy5jb20vdmlk/ZW9zL3RodW1ibmFp/bHMvb3JpZ2luYWxz/LzIxLzZjL2U3LzIx/NmNlNzI3NzQzMmFk/YjA2ZjYxZDg3MDUw/NzY4MWU3LjAwMDAw/MDAuanBns", // Celebration
      ];

      // Function to move the No button randomly
      function moveNoButton() {
        if (!gameActive) return;

        // Get container dimensions
        const containerRect = buttonContainer.getBoundingClientRect();
        const buttonRect = noButton.getBoundingClientRect();

        // Calculate safe boundaries (keep button fully inside container)
        const maxX = containerRect.width - buttonRect.width - 20; // 20px padding
        const maxY = containerRect.height - buttonRect.height - 20;

        // Generate random position
        const randomX = 10 + Math.floor(Math.random() * maxX);
        const randomY = 10 + Math.floor(Math.random() * maxY);

        // Apply new position
        noButton.style.left = randomX + "px";
        noButton.style.top = randomY + "px";
        noButton.style.right = "auto";
        noButton.style.transform = "none";

        // Increment counter
        noClickCount++;
        counterSpan.textContent = noClickCount;

        // Update message and image based on click count
        if (noClickCount <= maxNoClicks) {
          messageBox.textContent = noMessages[noClickCount - 1];
          displayImage.src = noImages[noClickCount - 1];
        }

        // Check if max clicks reached
        if (noClickCount >= maxNoClicks) {
          gameActive = false;
          noButton.style.display = "none"; // Hide the No button
          messageBox.textContent = "Rbahti bsh diri YES besiif 3lik ! 😤💖";
          displayImage.src =
            "https://imgs.search.brave.com/MIlmykrka4d0dDluTNKVjGR1gvUShW3E4W4gtIGZtX4/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9wMTYt/Y29tbW9uLXNpZ24u/dGlrdG9rY2RuLXVz/LmNvbS90b3MtdXNl/YXN0OC1hdnQtMDA2/OC10eDIvNzZkZDhh/ZjM3ODBjMzM2ZDJi/MTIzMGNhY2U5MDc0/NGJ-dHBsdi10aWt0/b2t4LWNyb3BjZW50/ZXI6MTAwOjEwMC5q/cGVnP2RyPTk2NDAm/cmVmcmVzaF90b2tl/bj0xNjZjYTkyYyZ4/LWV4cGlyZXM9MTc3/MTMyMjQwMCZ4LXNp/Z25hdHVyZT1TQWtU/bm1jaGRiUitlaWVO/aDdoSWVVdmtMTGM9/JnQ9NGQ1YjA0NzQm/cHM9MTM3NDA2MTAm/c2hwPWE1ZDQ4MDc4/JnNoY3A9ODFmODhi/NzAmaWRjPXVzZWFz/dDU";
          resetBtn.classList.remove("hidden");
        }
      }

      // Function when YES is clicked
      function sayYes() {
        if (!gameActive) {
          // Game was over, she finally said yes
          messageBox.textContent = "YAY! Finally! I love you so much! 💖💖💖";
          displayImage.src =
            "https://imgs.search.brave.com/KNUCE7AiH2NC7xlG-g7EnCHoVxLrCTan7ZcusBVojEw/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9tZWRp/YTAuZ2lwaHkuY29t/L21lZGlhL3YxLlky/bGtQVGM1TUdJM05q/RXhPWFJrTURkcE5X/STNZekJtTkRWNWNt/SnVNV2xrWm1FeU1H/dzJibU0yY0RobmJE/ZHNkWFpsYkNabGNE/MTJNVjluYVdaelgz/TmxZWEpqYUNaamRE/MW4veXR1MkdVWWJ2/aHo3elNoR3dTL2dp/cGh5LmdpZg.gif";
        } else if (gameActive) {
          // She said yes before max clicks
          gameActive = false;
          const randomIndex = Math.floor(Math.random() * yesMessages.length);
          messageBox.textContent = yesMessages[randomIndex];
          displayImage.src = yesImages[randomIndex];
          noButton.style.display = "none"; // Hide the No button
          resetBtn.classList.remove("hidden");
        }

        // Make YES button super happy
        yesButton.style.transform = "translateY(-50%) scale(1.2)";
        yesButton.style.backgroundColor = "#ff69b4";
        yesButton.textContent = "YES! 💖💖💖";
      }

      // Reset the game
      function resetGame() {
        noClickCount = 0;
        gameActive = true;
        counterSpan.textContent = "0";

        // Reset button positions and visibility
        noButton.style.display = "block";
        noButton.style.left = "auto";
        noButton.style.right = "50px";
        noButton.style.top = "50%";
        noButton.style.transform = "translateY(-50%)";

        yesButton.style.transform = "translateY(-50%) scale(1)";
        yesButton.style.backgroundColor = "#4caf50";
        yesButton.textContent = "YES 💖";

        // Reset message and image
        messageBox.textContent = "I have a question for you... 💕";
        displayImage.src =
          "https://imgs.search.brave.com/oEHcB553q3qmnc09vQ1h72f_1DKaJ_ALXVjzaO1wz98/rs:fit:860:0:0:0/g:ce/aHR0cHM6Ly9iLnRo/dW1icy5yZWRkaXRt/ZWRpYS5jb20vNUxt/TmctRjY1NVNuQ2s3/MzhnTTdnTmdCaUtU/cU55aXlZR2FKTlZa/TVlacy5qcGc";

        // Hide reset button
        resetBtn.classList.add("hidden");
      }

      // Initialize button positions
      window.onload = function () {
        // Make sure buttons start in correct positions
        noButton.style.position = "absolute";
        noButton.style.left = "auto";
        noButton.style.right = "50px";
        noButton.style.top = "50%";
        noButton.style.transform = "translateY(-50%)";

        yesButton.style.position = "absolute";
        yesButton.style.left = "50px";
        yesButton.style.top = "50%";
        yesButton.style.transform = "translateY(-50%)";
      };
    </script>
  </body>
</html>
